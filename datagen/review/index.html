<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>datagen · human review</title>
<style>
  :root{--bg:#0a0e14;--panel:#111722;--line:#1e2733;--ink:#e6edf3;--dim:#7d8896;
    --accent:#22d3ee;--good:#34d399;--warn:#f59e0b;--bad:#f87171;--edit:#e879f9;
    --mono:"SF Mono",ui-monospace,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px}
  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--line)}
  header h1{font-size:15px;margin:0}header h1 b{color:var(--accent)}
  .tally{display:flex;gap:6px;flex-wrap:wrap;font-family:var(--mono);font-size:11px}
  .chip{background:var(--panel);border:1px solid var(--line);padding:2px 9px;border-radius:20px;color:var(--dim)}
  .chip b{color:var(--ink)}
  .wrap{max-width:1000px;margin:0 auto;padding:20px}
  .nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  button{font-family:var(--mono);font-size:12px;border-radius:7px;cursor:pointer;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);padding:8px 13px}
  button:hover{border-color:var(--accent)}
  button.good{border-color:var(--good);color:var(--good)} button.good:hover{background:rgba(52,211,153,.1)}
  button.bad{border-color:var(--bad);color:var(--bad)} button.bad:hover{background:rgba(248,113,113,.1)}
  button.act{background:var(--accent);color:#04222a;border:0;font-weight:600}
  .meta{font-family:var(--mono);font-size:12px;color:var(--dim);margin-left:auto;display:flex;gap:8px;align-items:center}
  .badge{padding:2px 8px;border-radius:5px;font-size:11px}
  .b-teacher{background:rgba(34,211,238,.12);color:var(--accent)}
  .b-human{background:rgba(232,121,249,.14);color:var(--edit)}
  .b-pending{background:rgba(245,158,11,.14);color:var(--warn)}
  .b-approved{background:rgba(52,211,153,.14);color:var(--good)}
  .b-rejected{background:rgba(248,113,113,.14);color:var(--bad)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .lbl{font-family:var(--mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .task{white-space:pre-wrap;font-size:13px;color:var(--dim);line-height:1.5}
  textarea{width:100%;min-height:340px;background:#0d121b;border:1px solid var(--line);color:var(--ink);
    font-family:var(--mono);font-size:12.5px;line-height:1.5;padding:12px;border-radius:8px;resize:vertical}
  .verify{font-family:var(--mono);font-size:13px;margin:10px 0;padding:8px 12px;border-radius:8px;display:none}
  .verify.pass{display:block;background:rgba(52,211,153,.1);color:var(--good);border:1px solid rgba(52,211,153,.3)}
  .verify.fail{display:block;background:rgba(248,113,113,.1);color:var(--bad);border:1px solid rgba(248,113,113,.3)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
  .hint{color:var(--dim);font-size:12px;font-family:var(--mono)}
</style>
</head>
<body>
<header>
  <h1><b>datagen</b> · human review</h1>
  <div class="tally" id="tally"></div>
</header>
<div class="wrap">
  <div class="nav">
    <button onclick="go(-1)">‹ prev</button>
    <span class="hint" id="pos"></span>
    <button onclick="go(1)">next ›</button>
    <button onclick="jumpPending()">⏭ next pending</button>
    <div class="meta" id="meta"></div>
  </div>
  <div class="card">
    <div class="lbl">task · <span id="domain"></span></div>
    <div class="task" id="task"></div>
  </div>
  <div class="card">
    <div class="lbl">trajectory (editable) — read → reason → act → verify + code</div>
    <textarea id="content" spellcheck="false"></textarea>
    <div class="verify" id="verify"></div>
    <div class="row">
      <button class="act" onclick="verify()">⟳ re-verify edited code</button>
      <button class="good" onclick="decide('approved')">✓ approve</button>
      <button class="bad" onclick="decide('rejected')">✗ reject</button>
      <span class="hint">edits auto-mark the row <b style="color:var(--edit)">human-edited</b> and must still pass verify</span>
    </div>
  </div>
</div>
<script>
const $=s=>document.querySelector(s); let ROWS=[], i=0;
async function load(){ ROWS=await(await fetch('/data')).json(); render(); }
function tally(){
  const c={teacher:0,human:0,approved:0,rejected:0,pending:0};
  ROWS.forEach(r=>{ r.source==='human-edited'?c.human++:c.teacher++;
    c[r.status==='pending_review'?'pending':r.status]++; });
  $('#tally').innerHTML=[
    `<span class="chip"><b>${ROWS.length}</b> rows</span>`,
    `<span class="chip">✓ <b>${c.approved}</b> approved</span>`,
    `<span class="chip">✗ <b>${c.rejected}</b> rejected</span>`,
    `<span class="chip">◷ <b>${c.pending}</b> pending</span>`,
    `<span class="chip" style="color:var(--edit)">✎ <b>${c.human}</b> human-edited</span>`,
  ].join('');
}
function render(){
  if(!ROWS.length) return;
  const r=ROWS[i];
  $('#pos').textContent=`${i+1} / ${ROWS.length}`;
  $('#domain').textContent=r.domain;
  $('#task').textContent=r.messages[1].content;
  $('#content').value=r.messages[2].content;
  $('#verify').className='verify'; $('#verify').textContent='';
  const st=r.status==='pending_review'?'pending':r.status;
  $('#meta').innerHTML=`<span class="badge b-${r.source==='human-edited'?'human':'teacher'}">${r.source}</span>`
    +`<span class="badge b-${st}">${st}</span><span class="hint">verified ${r.checks}</span>`;
  tally();
}
function go(d){ i=Math.max(0,Math.min(ROWS.length-1,i+d)); render(); }
function jumpPending(){ const n=ROWS.findIndex((r,k)=>k>i&&r.status==='pending_review');
  if(n>=0){i=n;render();} else {const m=ROWS.findIndex(r=>r.status==='pending_review'); if(m>=0){i=m;render();}} }
async function verify(){
  const r=await(await fetch('/grade',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({index:i,content:$('#content').value})})).json();
  const v=$('#verify');
  if(r.solved){ v.className='verify pass'; v.textContent=`✓ PASSES — ${r.passed}/${r.total} rule checks`; }
  else { v.className='verify fail'; v.textContent=`✗ FAILS — ${r.passed}/${r.total}. ${(r.failures||[]).join(' | ')}`; }
  return r.solved;
}
async function decide(status){
  if(status==='approved'){ const ok=await verify(); if(!ok){ alert('Edited code does not pass the rule check — fix it before approving.'); return; } }
  const r=await(await fetch('/save',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({index:i,content:$('#content').value,status})})).json();
  ROWS[i].status=status; ROWS[i].source=r.source;
  ROWS[i].messages[2].content=$('#content').value;
  tally(); jumpPending();
}
load();
</script>
</body>
</html>
